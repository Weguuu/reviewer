<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INF-304 Java Code Reviewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --accent:#58a6ff;--text:#c9d1d9;--text-strong:#f0f6fc;--text-muted:#8b949e;
  --green:#3fb950;--purple:#a371f7;--orange:#f0883e;--red:#f85149;--yellow:#e3b341;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
/* Header */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.hdr h1{font-size:1.1rem;font-weight:700;color:var(--text-strong);white-space:nowrap;background:linear-gradient(135deg,#58a6ff,#a371f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.search-wrap{flex:1;min-width:180px;max-width:380px;position:relative}
.search-wrap input{width:100%;padding:6px 10px 6px 32px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;outline:none}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap::before{content:'⌕';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:15px;pointer-events:none}
.stat{font-size:12px;color:var(--text-muted);white-space:nowrap}
/* Session nav */
.sess-nav{display:flex;gap:8px;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto}
.sess-tab{padding:5px 16px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:all .15s}
.sess-tab:hover{background:var(--surface2);color:var(--text)}
.sess-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
/* Main */
.main{padding:24px;max-width:1400px;margin:0 auto}
.sess-hdr{margin-bottom:20px}
.sess-hdr h2{font-size:1.3rem;font-weight:700;color:var(--text-strong)}
.sess-hdr p{color:var(--text-muted);font-size:13px;margin-top:2px}
/* Section group */
.sec-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);padding:8px 0 12px;border-bottom:1px solid var(--border);margin:24px 0 16px;display:flex;align-items:center;gap:8px}
.sec-label::before{content:'';flex:1;height:1px;background:var(--border)}
/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(560px,1fr));gap:16px}
/* Card */
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:#58a6ff55}
.card-hdr{padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.card-left h3{font-size:13px;font-weight:600;color:var(--text-strong);font-family:'Courier New',monospace}
.card-left p{font-size:12px;color:var(--text-muted);margin-top:2px}
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.t-output{background:#1a3a5c;color:#7eb8f7}
.t-input{background:#1a3a5c;color:#7eb8f7}
.t-classes{background:#2d1f4e;color:#c4a5fa}
.t-inheritance{background:#2d1f4e;color:#c4a5fa}
.t-oop{background:#2d1f4e;color:#c4a5fa}
.t-arrays{background:#3d2a0a;color:#f0a84a}
.t-strings{background:#3d2e0a;color:#e3b341}
.t-loops{background:#0d3320;color:#3fb950}
.t-conditionals{background:#0a2d2d;color:#39cfc8}
.t-exceptions{background:#3d0f0f;color:#f87171}
.t-static{background:#3d2a0a;color:#f0a84a}
.t-operators{background:#0a2d2d;color:#39cfc8}
.t-types{background:#3d2e0a;color:#e3b341}
.t-casting{background:#0a2d2d;color:#39cfc8}
.t-collections{background:#2d1f4e;color:#c4a5fa}
.t-debugging{background:#3d0f0f;color:#f87171}
/* Workbook tab accent */
.sess-tab.wb-tab.on{background:var(--purple);border-color:var(--purple)}
/* Workbook layout */
.wb-domain{margin-bottom:36px}
.wb-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px}
.wb-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.wb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:10px;margin-bottom:20px}
.wb-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:13px 15px;display:flex;align-items:flex-start;gap:10px}
.wb-num{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);font-size:10px;font-weight:700;color:var(--text-muted);display:flex;align-items:center;justify-content:center;margin-top:1px}
.wb-q{font-size:13px;color:var(--text);line-height:1.7;flex:1}
.blank{display:inline-block;min-width:72px;border-bottom:2px solid var(--purple);cursor:pointer;color:transparent;padding:0 5px;font-weight:700;font-family:'Courier New',monospace;font-size:12px;transition:color .15s;user-select:none;border-radius:2px 2px 0 0}
.blank:hover{background:#a371f722}
.blank.show{color:var(--purple)}
.wb-toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wb-btn{padding:4px 13px;background:transparent;border:1px solid var(--purple);border-radius:6px;color:var(--purple);cursor:pointer;font-size:12px;transition:all .15s}
.wb-btn:hover{background:var(--purple);color:#fff}
/* Project cards */
.proj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(520px,1fr));gap:14px}
.proj-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.proj-card-hdr{background:var(--surface2);padding:11px 15px;border-bottom:1px solid var(--border)}
.proj-card-hdr h3{font-size:13px;font-weight:700;color:var(--text-strong)}
.proj-meta{display:flex;gap:14px;margin-top:5px;flex-wrap:wrap}
.proj-meta-item{font-size:11px;color:var(--text-muted)}
.proj-meta-item b{color:var(--text);font-weight:600}
.proj-files{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px}
.proj-file{padding:1px 7px;background:var(--bg);border:1px solid var(--border);border-radius:3px;font-size:10px;font-family:'Courier New',monospace;color:var(--accent)}
.proj-body{padding:13px 15px}
.proj-purpose{font-size:13px;color:var(--text);line-height:1.65;margin-bottom:14px;padding:9px 12px;background:var(--surface2);border-radius:6px;border-left:3px solid var(--purple)}
.proj-objectives{margin-bottom:14px}
.proj-objectives-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-muted);margin-bottom:6px}
.proj-objectives ul{list-style:none;display:flex;flex-direction:column;gap:4px}
.proj-objectives ul li{font-size:12px;color:var(--text-muted);padding-left:14px;position:relative}
.proj-objectives ul li::before{content:'▸';position:absolute;left:0;color:var(--purple)}
.proj-steps{list-style:none;counter-reset:step}
.proj-steps li{counter-increment:step;padding:7px 0 7px 34px;position:relative;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);line-height:1.55}
.proj-steps li:last-child{border-bottom:none}
.proj-steps li::before{content:counter(step);position:absolute;left:0;top:7px;width:22px;height:22px;background:var(--purple);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700}
/* File tabs */
.ftabs{display:flex;background:#0d1117;border-bottom:1px solid var(--border);overflow-x:auto}
.ftab{padding:6px 14px;background:transparent;border:none;border-right:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-size:11px;font-family:'Courier New',monospace;white-space:nowrap;transition:all .15s;position:relative}
.ftab:hover{background:var(--surface2);color:var(--text)}
.ftab.on{color:var(--accent);background:var(--surface)}
.ftab.on::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
.ftab.fin{color:var(--green)}
.ftab.fin.on{color:var(--green)}
.ftab.fin.on::after{background:var(--green)}
/* Code panel */
.cpanel{display:none;position:relative}
.cpanel.on{display:block}
.cpanel pre{margin:0!important;border-radius:0!important;background:#0d1117!important;max-height:380px;overflow:auto;font-size:12px!important;line-height:1.6!important}
.cpanel pre code{font-family:'Fira Code','Cascadia Code','Courier New',monospace!important}
.copy-btn{position:absolute;top:8px;right:8px;padding:3px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text-muted);cursor:pointer;font-size:11px;transition:all .15s;z-index:5}
.copy-btn:hover{background:var(--border);color:var(--text)}
.copy-btn.ok{color:var(--green);border-color:var(--green)}
/* Misc */
.hidden{display:none!important}
.empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#58a6ff88}
@media(max-width:640px){.grid{grid-template-columns:1fr}.main{padding:12px}.hdr{padding:10px 12px}.sess-nav{padding:10px 12px}}
</style>
</head>

let activeSession=1, searchQ='';

function countExercises(){let t=0;S.forEach(s=>t+=s.exercises.length);return t;}

function buildNav(){
  const nav=document.getElementById('snav');
  nav.innerHTML='';
  S.forEach(s=>{
    const btn=document.createElement('button');
    btn.className='sess-tab'+(s.id===activeSession?' on':'');
    btn.textContent=s.title+' — '+s.topic;
    btn.onclick=()=>{activeSession=s.id;buildNav();render();};
    nav.appendChild(btn);
  });
  const wb=document.createElement('button');
  wb.className='sess-tab wb-tab'+(activeSession==='wb'?' on':'');
  wb.textContent='📖 Workbook';
  wb.onclick=()=>{activeSession='wb';buildNav();render();};
  nav.appendChild(wb);
}

function matchSearch(ex,q){
  if(!q)return true;
  q=q.toLowerCase();
  return ex.id.toLowerCase().includes(q)||
    ex.title.toLowerCase().includes(q)||
    ex.desc.toLowerCase().includes(q)||
    ex.tags.some(t=>t.includes(q))||
    ex.files.some(f=>f.code.toLowerCase().includes(q));
}

function switchTab(card,idx){
  card.querySelectorAll('.ftab').forEach((t,i)=>{t.classList.toggle('on',i===idx);});
  card.querySelectorAll('.cpanel').forEach((p,i)=>{p.classList.toggle('on',i===idx);});
}

function buildCard(ex){
  const card=document.createElement('div');
  card.className='card';
  // Header
  const hdr=document.createElement('div');hdr.className='card-hdr';
  const left=document.createElement('div');left.className='card-left';
  const h3=document.createElement('h3');h3.textContent=ex.id;
  const p=document.createElement('p');p.textContent=ex.title+' — '+ex.desc;
  const tags=document.createElement('div');tags.className='tags';
  ex.tags.forEach(t=>{const sp=document.createElement('span');sp.className='tag '+(TC[t]||'t-output');sp.textContent=t;tags.appendChild(sp);});
  left.appendChild(h3);left.appendChild(p);left.appendChild(tags);
  hdr.appendChild(left);
  card.appendChild(hdr);
  // Tabs
  const ftabs=document.createElement('div');ftabs.className='ftabs';
  const panels=document.createElement('div');
  ex.files.forEach((f,i)=>{
    const tab=document.createElement('button');
    tab.className='ftab'+(i===0?' on':'')+(f.fin?' fin':'');
    tab.textContent=f.n+(f.fin?' ✓':'');
    tab.onclick=()=>switchTab(card,i);
    ftabs.appendChild(tab);
    const panel=document.createElement('div');
    panel.className='cpanel'+(i===0?' on':'');
    const pre=document.createElement('pre');
    const code=document.createElement('code');
    code.className='language-java';
    code.textContent=f.code;
    pre.appendChild(code);
    const copyBtn=document.createElement('button');
    copyBtn.className='copy-btn';
    copyBtn.textContent='Copy';
    copyBtn.onclick=()=>{
      navigator.clipboard.writeText(f.code).catch(()=>{});
      copyBtn.textContent='Copied!';copyBtn.classList.add('ok');
      setTimeout(()=>{copyBtn.textContent='Copy';copyBtn.classList.remove('ok');},2000);
    };
    panel.appendChild(pre);
    panel.appendChild(copyBtn);
    panels.appendChild(panel);
    if(typeof Prism!=='undefined')Prism.highlightElement(code);
  });
  card.appendChild(ftabs);
  card.appendChild(panels);
  return card;
}

function renderBlankQ(domainIdx, q, globalIdx){
  const card=document.createElement('div');card.className='wb-card';
  const num=document.createElement('div');num.className='wb-num';num.textContent=globalIdx+1;
  const qEl=document.createElement('div');qEl.className='wb-q';
  const raw=q.q;
  const parts=raw.split(/\{\{([^}]+)\}\}/);
  parts.forEach((part,i)=>{
    if(i%2===0){qEl.appendChild(document.createTextNode(part));}
    else{
      const sp=document.createElement('span');sp.className='blank';sp.textContent=part;
      sp.title='Click to reveal';
      sp.onclick=()=>sp.classList.toggle('show');
      qEl.appendChild(sp);
    }
  });
  card.appendChild(num);card.appendChild(qEl);
  return card;
}

function renderWorkbook(){
  const main=document.getElementById('main');
  main.innerHTML='';
  const hdr=document.createElement('div');hdr.className='sess-hdr';
  hdr.innerHTML='<h2>📖 Student Workbook</h2><p>Fill-in-the-blanks &amp; project instructions — click any underlined blank to reveal the answer</p>';
  main.appendChild(hdr);
  WB.forEach((domain,di)=>{
    const sec=document.createElement('div');sec.className='wb-domain';
    // domain divider
    const dl=document.createElement('div');dl.className='sec-label';dl.textContent=domain.title;
    sec.appendChild(dl);
    // fill-in-the-blanks
    if(domain.fillBlanks&&domain.fillBlanks.length){
      const fTitle=document.createElement('div');fTitle.className='wb-section-title';fTitle.textContent='Fill in the Blanks';
      const toolbar=document.createElement('div');toolbar.className='wb-toolbar';
      const revBtn=document.createElement('button');revBtn.className='wb-btn';revBtn.textContent='Reveal All';
      const hideBtn=document.createElement('button');hideBtn.className='wb-btn';hideBtn.textContent='Hide All';
      const grid=document.createElement('div');grid.className='wb-grid';
      domain.fillBlanks.forEach((q,qi)=>grid.appendChild(renderBlankQ(di,q,qi)));
      revBtn.onclick=()=>grid.querySelectorAll('.blank').forEach(b=>b.classList.add('show'));
      hideBtn.onclick=()=>grid.querySelectorAll('.blank').forEach(b=>b.classList.remove('show'));
      toolbar.appendChild(revBtn);toolbar.appendChild(hideBtn);
      sec.appendChild(fTitle);sec.appendChild(toolbar);sec.appendChild(grid);
    }
    // projects
    if(domain.projects&&domain.projects.length){
      const pTitle=document.createElement('div');pTitle.className='wb-section-title';pTitle.textContent='Project Instructions';
      sec.appendChild(pTitle);
      const pgrid=document.createElement('div');pgrid.className='proj-grid';
      domain.projects.forEach(proj=>{
        const pc=document.createElement('div');pc.className='proj-card';
        // header
        const phdr=document.createElement('div');phdr.className='proj-card-hdr';
        const ph3=document.createElement('h3');ph3.textContent=proj.title;
        const pmeta=document.createElement('div');pmeta.className='proj-meta';
        pmeta.innerHTML=`<span class="proj-meta-item">⏱ <b>${proj.time}</b></span><span class="proj-meta-item">🎬 <b>${proj.video}</b></span>`;
        const pfiles=document.createElement('div');pfiles.className='proj-files';
        proj.files.forEach(f=>{const s=document.createElement('span');s.className='proj-file';s.textContent=f;pfiles.appendChild(s);});
        phdr.appendChild(ph3);phdr.appendChild(pmeta);phdr.appendChild(pfiles);
        // body
        const pbody=document.createElement('div');pbody.className='proj-body';
        const ppur=document.createElement('div');ppur.className='proj-purpose';ppur.textContent=proj.purpose;
        const pobj=document.createElement('div');pobj.className='proj-objectives';
        const pobjTitle=document.createElement('div');pobjTitle.className='proj-objectives-title';pobjTitle.textContent='Objectives Covered';
        const pobjList=document.createElement('ul');
        proj.objectives.forEach(o=>{const li=document.createElement('li');li.textContent=o;pobjList.appendChild(li);});
        pobj.appendChild(pobjTitle);pobj.appendChild(pobjList);
        const pstepsTitle=document.createElement('div');pstepsTitle.className='proj-objectives-title';pstepsTitle.textContent='Steps for Completion';
        const psteps=document.createElement('ol');psteps.className='proj-steps';
        proj.steps.forEach(s=>{const li=document.createElement('li');li.textContent=s;psteps.appendChild(li);});
        pbody.appendChild(ppur);pbody.appendChild(pobj);pbody.appendChild(pstepsTitle);pbody.appendChild(psteps);
        pc.appendChild(phdr);pc.appendChild(pbody);
        pgrid.appendChild(pc);
      });
      sec.appendChild(pgrid);
    }
    main.appendChild(sec);
  });
  document.getElementById('stat').textContent=WB.reduce((t,d)=>t+d.fillBlanks.length,0)+' blanks total';
}

function render(){
  if(activeSession==='wb'){renderWorkbook();return;}
  const sess=S.find(s=>s.id===activeSession);
  const main=document.getElementById('main');
  main.innerHTML='';
  const hdr=document.createElement('div');hdr.className='sess-hdr';
  const h2=document.createElement('h2');h2.textContent=sess.title+' — '+sess.topic;
  const sub=document.createElement('p');
  const all=sess.exercises.length;
  const vis=sess.exercises.filter(e=>matchSearch(e,searchQ)).length;
  sub.textContent=vis+' of '+all+' exercises'+(searchQ?' matching "'+searchQ+'"':'');
  hdr.appendChild(h2);hdr.appendChild(sub);
  main.appendChild(hdr);
  // Group by section
  const sections={};const secOrder=[];
  sess.exercises.forEach(ex=>{
    if(!sections[ex.section]){sections[ex.section]=[];secOrder.push(ex.section);}
    sections[ex.section].push(ex);
  });
  let totalShown=0;
  secOrder.forEach(secName=>{
    const exs=sections[secName].filter(e=>matchSearch(e,searchQ));
    if(exs.length===0)return;
    totalShown+=exs.length;
    const sl=document.createElement('div');sl.className='sec-label';sl.textContent=secName;
    main.appendChild(sl);
    const grid=document.createElement('div');grid.className='grid';
    exs.forEach(ex=>grid.appendChild(buildCard(ex)));
    main.appendChild(grid);
  });
  if(totalShown===0){
    const empty=document.createElement('div');empty.className='empty';
    empty.innerHTML='<p>No exercises match <strong>"'+searchQ+'"</strong></p>';
    main.appendChild(empty);
  }
  document.getElementById('stat').textContent=countExercises()+' exercises total';
}

// Search with debounce
let debTimer;
document.getElementById('srch').addEventListener('input',e=>{
  clearTimeout(debTimer);
  debTimer=setTimeout(()=>{searchQ=e.target.value.trim();render();},200);
});

buildNav();
render();
